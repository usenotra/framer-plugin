name: Release On Version Change

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect version change
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs')

            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
            const version = pkg.version

            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('changed', 'true')
              core.setOutput('version', version)
              return
            }

            const beforeSha = context.payload.before

            if (!beforeSha || /^0+$/.test(beforeSha)) {
              core.setOutput('changed', 'true')
              core.setOutput('version', version)
              return
            }

            const previous = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'package.json',
              ref: beforeSha,
            })

            const previousContent = Buffer.from(previous.data.content, 'base64').toString('utf8')
            const previousVersion = JSON.parse(previousContent).version

            core.setOutput('changed', String(previousVersion !== version))
            core.setOutput('version', version)

  release:
    runs-on: ubuntu-latest
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release archive
        env:
          VERSION: ${{ needs.detect-version.outputs.version }}
        shell: bash
        run: |
          bun run pack
          mv plugin.zip "notra-v${VERSION}.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-version.outputs.version }}
          name: v${{ needs.detect-version.outputs.version }}
          files: notra-v${{ needs.detect-version.outputs.version }}.zip
          generate_release_notes: true
